name: Sync Notebook to Google Drive

on:
  push:
    branches: ["main"]
    paths:
      - "notebook/**.ipynb"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-to-drive:
    runs-on: ubuntu-latest
    env:
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Drive dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Sync files to Google Drive
        shell: bash
        run: |
          set -euo pipefail
          for var in GDRIVE_CLIENT_ID GDRIVE_CLIENT_SECRET GDRIVE_REFRESH_TOKEN GDRIVE_FOLDER_ID; do
            if [ -z "${!var}" ]; then
              echo "Secret $var is missing."
              exit 1
            fi
          done

          python - <<'PY'
          import os
          import sys
          from pathlib import Path

          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.errors import HttpError
          from googleapiclient.http import MediaFileUpload

          ROOT_FOLDER_ID = os.environ["GDRIVE_FOLDER_ID"]

          creds = Credentials(
              token=None,
              refresh_token=os.environ["GDRIVE_REFRESH_TOKEN"],
              token_uri="https://oauth2.googleapis.com/token",
              client_id=os.environ["GDRIVE_CLIENT_ID"],
              client_secret=os.environ["GDRIVE_CLIENT_SECRET"],
          )
          drive = build("drive", "v3", credentials=creds)

          def api_call(request):
              return request.execute(num_retries=3)

          def find_child(parent_id: str, name: str, mime_type: str | None = None):
              escaped_name = name.replace("'", "\\'")
              q = [
                  f"'{parent_id}' in parents",
                  f"name = '{escaped_name}'",
                  "trashed = false",
              ]
              if mime_type:
                  q.append(f"mimeType = '{mime_type}'")
              resp = api_call(
                  drive.files().list(
                      q=" and ".join(q),
                      spaces="drive",
                      fields="files(id,name,mimeType)",
                      pageSize=1,
                  )
              )
              files = resp.get("files", [])
              return files[0] if files else None

          def upsert_file(parent_id: str, local_path: Path, file_name: str):
              existing = find_child(parent_id, file_name)
              media = MediaFileUpload(str(local_path), mimetype="application/octet-stream", resumable=False)

              if existing and existing.get("mimeType") != "application/vnd.google-apps.folder":
                  api_call(drive.files().update(fileId=existing["id"], media_body=media))
                  print(f"UPDATED: {file_name}")
              else:
                  api_call(drive.files().create(
                      body={"name": file_name, "parents": [parent_id]},
                      media_body=media,
                      fields="id",
                  ))
                  print(f"CREATED: {file_name}")

          notebook_path = Path("notebook/deteccao_malha_viaria.ipynb")
          if not notebook_path.exists():
              print(f"Arquivo nao encontrado: {notebook_path}")
              sys.exit(1)

          upsert_file(ROOT_FOLDER_ID, notebook_path, notebook_path.name)
          print("Concluido.")
          PY